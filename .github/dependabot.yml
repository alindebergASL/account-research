# Dependabot config — weekly dependency PRs.
#
# Scope:
#   - npm packages in web/ (the Next.js app)
#   - GitHub Actions versions in .github/workflows/
#
# Output is grouped to reduce PR noise and to keep coupled-ecosystem packages
# in lockstep. Group order matters: dependabot uses first-match resolution, so
# the most specific groups come first. Without grouping, a partial bump (e.g.
# `react` without `@types/react-dom`) creates a PR that fails `npm ci` because
# the peer-dep tree can't resolve — exactly what happened to the original
# react@19 bump (PR #63, closed).
#
# Open-PR caps stay modest so the Actions runner queue and review surface
# don't get spammed. Security updates bypass these caps per GitHub policy.

version: 2
updates:
  # Next.js app
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    groups:
      # First: ecosystem-coupled packages where a partial bump breaks the
      # peer-dep tree. These MUST move together.
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      next:
        patterns:
          - "next"
          - "@next/*"
          - "eslint-config-next"
      eslint:
        # eslint-config-next is already captured by `next` (first match wins),
        # so this group covers just the core ESLint surface.
        patterns:
          - "eslint"
          - "eslint-*"
          - "@typescript-eslint/*"
      # Catch-all for remaining @types/* (after the react ones above).
      types:
        patterns:
          - "@types/*"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # GitHub Actions used by .github/workflows/ci.yml
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
